name: audit-trail-framework
description: >
  Generic entity-agnostic audit trail framework. Captures who changed what, when,
  old/new state as JSON, filterable by date/actor/field/approval-status.
  Provides CSV export. Extends existing AuditDiffGenerator and SlabUpgradeAuditLogService
  patterns into a unified framework.

classification: shared-kernel
status: designed

owner: anuj
owner_epic: auditing

consumed_by:
  - maker-checker
  - tier-category
  - tier-benefits
  - supplementary-partner-program

repos:
  primary: emf-parent/pointsengine-emf
  api_layer: intouch-api-v3

key_interfaces:
  - ConfigAuditService (com.capillary.shopbook.points.services.audit)
  - ConfigAuditEntry (com.capillary.shopbook.points.entity)
  - AuditQueryFilter (com.capillary.shopbook.points.services.audit)
  - ChangeSource (com.capillary.shopbook.points.entity)

db_tables:
  - config_audit_log

integration_points:
  - Called by MakerCheckerService on approve (change_source = MAKER_CHECKER_APPROVE)
  - Called directly by any service for non-approval changes (DIRECT_EDIT, AIRA, SYSTEM)

existing_codebase_patterns:
  - AuditDiffGenerator (intouch-api-v3) -- generic JsonNode diff, reusable directly
  - SlabUpgradeAuditLogService (emf-parent) -- slab-specific, pattern reference
  - SlabDowngradeAuditLogService (emf-parent) -- slab-specific, pattern reference
  - AuditTrailDiffDto / AuditLogTrailDto (emf-parent) -- slab-specific DTOs, to be generalized
  - PEAuditTrailHelper (emf-parent) -- promotion change detection, pattern reference
  - TargetGroupAuditLogDao (intouch-api-v3) -- target loyalty audit, pattern reference

build_order:
  1: Core entity (ConfigAuditEntry) + DAO + DB migration
  2: ConfigAuditService implementation (record, query, filter)
  3: CSV export service
  4: REST API in intouch-api-v3 (change log listing controller)
