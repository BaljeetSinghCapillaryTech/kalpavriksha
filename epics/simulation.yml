name: simulation
owner: baljeet
layer: 3
status: not-started

description: >
  Simulation Mode -- test proposed tier config changes against current member
  base before publishing. AIRA-based (AI/analytics). Deferred to Layer 3,
  starts after Tier Category CRUD is complete.

builds_shared: []

consumes_shared: []

brd_source: brd-tiers-benefits.md
brd_sections:
  - "E1-US6: Simulation Mode"

user_stories:
  - "As Maya, I want to test a proposed tier config change against my current member base"
  - "Simulation inputs: proposed changes to any tier config dimension"
  - "Simulation output: member distribution forecast (before and after)"
  - "Bar chart: current vs projected distribution per tier"
  - "Drill-down: export list of affected member IDs (PII masked for non-admin)"

repos_affected:
  - emf-parent/pointsengine-emf (core: simulation engine)
  - peb (reads: member distribution data, tier evaluation logic)

dependencies:
  - Tier Category must be complete (needs tier config CRUD to have config to simulate against)
  - AIRA integration (AI/analytics platform)
  - PEB member distribution data access

acceptance_criteria:
  - POST /tiers/{tierId}/simulate accepts proposed config changes
  - Returns member distribution forecast (count per tier before and after)
  - Visualization data suitable for bar chart rendering
  - Drill-down export with PII masking
