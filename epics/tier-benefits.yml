name: tier-benefits
owner: baljeet
layer: 2
status: not-started

description: >
  Benefits as a Product -- standalone benefits module with benefit categories,
  benefit instances per tier, custom fields, tier linkage, state lifecycle.
  Greenfield -- no existing BenefitCategory concept in codebase.

builds_shared: []

consumes_shared:
  - maker-checker-framework
  - audit-trail-framework

brd_source:
  - brd-tiers-benefits.md
  - brd-benefit-categories.md

brd_sections:
  - "E2-US1: Benefits Listing"
  - "E2-US2: Benefit Creation"
  - "E2-US3: Custom Fields for Benefits"
  - "Benefit Categories Specification (full document)"

user_stories:
  - "As Maya, I want to see all benefits organized by category, tier, and lifecycle state"
  - "As Maya, I want to create a new benefit and link it to one or more tiers"
  - "Benefit types: Points Multiplier, Flat Points, Coupon, Badge, Free Shipping, Custom"
  - "9 category types: Welcome Gift, Upgrade Bonus, Tier Badge, Renewal Bonus, Loyalty Voucher, Earn Points, Birthday Bonus, Priority Support, Free Shipping"
  - "Custom field types: Text, Number, Date, Dropdown, Boolean, File URL"
  - "State lifecycle: DRAFT -> PENDING_APPROVAL -> ACTIVE -> STOPPED"
  - "Matrix view: categories as rows, tiers as columns, configured value in each cell"

repos_affected:
  - emf-parent/pointsengine-emf (core: new entities BenefitCategory, BenefitInstance, services, DAOs)
  - intouch-api-v3 (API: benefits listing/CRUD controller)

acceptance_criteria:
  - BenefitCategory entity with categoryId, categoryName, categoryType, triggerEvent, tierApplicability
  - BenefitInstance entity linked to one Category + one Tier with reward value fields
  - 9 category types supported with correct trigger events
  - Custom fields definable at org level, available across all benefits
  - Tier linkage with per-tier parameter values (e.g., Gold=2x, Platinum=3x)
  - State machine follows DRAFT -> PENDING_APPROVAL -> ACTIVE via MakerCheckerService
  - Matrix view API returns categories x tiers grid

existing_codebase:
  - Benefits.java exists but only has VOUCHER/POINTS types and promotionId linkage
  - BenefitsType enum has only 2 values -- needs major extension or new model
  - This is effectively a greenfield build alongside the existing Benefits entity
