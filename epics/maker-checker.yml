name: maker-checker
owner: ritwik
layer: 1
status: not-started

description: >
  Build the entity-agnostic Maker-Checker Framework as a shared module,
  plus the approval queue REST API. This is the foundation that all
  config-changing epics depend on.

builds_shared:
  - maker-checker-framework

consumes_shared: []
  # Note: MC calls ConfigAuditService.record() on approve.
  # During development, mock ConfigAuditService until Anuj's
  # audit-trail-framework is available.

brd_source: brd-tiers-benefits.md
brd_sections:
  - "E1-US4: Maker-Checker Approval Workflow"
  - "Section 5: Configuration Rules & Constraints (benefit-categories BRD)"

user_stories:
  - "As Alex, I want to review and approve every tier/benefit config change before it goes live"
  - "Approval queue shows all pending changes across Tiers and Benefits"
  - "Each pending item shows diff view (old vs new), who requested, when, impact summary"
  - "Approver actions: Approve, Reject (mandatory comment), Request Changes (mandatory comment)"
  - "Email + in-platform notification to approver on submission"
  - "Audit log: every approval/rejection recorded with timestamp, actor, comment"

repos_affected:
  - emf-parent/pointsengine-emf (core: entities, service, DAO, state machine)
  - intouch-api-v3 (API: approval queue controller, DTOs)
  - Thrift/thrift-ifaces-emf (IDL: enums, structs)

acceptance_criteria:
  - Generic state machine works for TIER, BENEFIT, BENEFIT_CATEGORY, SUPPLEMENTARY_PARTNER_PROGRAM
  - submitForApproval creates PendingChange with status PENDING_APPROVAL
  - review(APPROVE) transitions to ACTIVE and calls ConfigAuditService.record()
  - review(REJECT) transitions back to DRAFT with mandatory comment
  - review(REQUEST_CHANGES) transitions back to DRAFT with mandatory comment
  - Invalid transitions throw IllegalStateException
  - Approval queue API supports filtering by entityType and status
  - getDiff returns field-level JSON diff between old and new state
